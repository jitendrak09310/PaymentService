spring.application.name=payment-service
server.port=9090

spring.datasource.url=jdbc:mysql://localhost:3306/payments
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


resilience4j.retry.instances.paymentRetry.max-attempts=3
resilience4j.retry.instances.paymentRetry.wait-duration=2s

resilience4j.circuitbreaker.instances.paymentCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentCB.minimum-number-of-calls=5


